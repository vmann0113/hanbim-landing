<script>

const BRANCH={
name:"창원점",
phone:"0552632325",
tel:"055-263-2325",
reserve:"https://booking.naver.com/booking/6/bizes/843111",
kakao:"https://open.kakao.com/o/sdcvbh5e"
}

document.getElementById("btnCall").onclick=()=>{
location.href="tel:"+BRANCH.phone
}

document.getElementById("btnKakao").onclick=()=>{
window.open(BRANCH.kakao)
}

document.getElementById("btnReserve").onclick=()=>{
window.open(BRANCH.reserve)
}

/* 12지점 네이버예약 */

const NAVER_BASE_W=1080
const NAVER_BASE_H=937.2

const BRANCH_LINKS={
busan:"https://m.booking.naver.com/booking/6/bizes/661812",
centum:"https://booking.naver.com/booking/6/bizes/1577219",
ulsan:"https://booking.naver.com/booking/6/bizes/1534767",
gimhae:"https://booking.naver.com/booking/6/bizes/1402679",
yangsan:"https://booking.naver.com/booking/13/bizes/868629",
changwon:"https://booking.naver.com/booking/6/bizes/843111",
masan:"https://booking.naver.com/booking/6/bizes/1526541",
jinju:"https://m.booking.naver.com/booking/6/bizes/1485854",
incheon:"https://m.booking.naver.com/booking/13/bizes/1039475",
ansan:"https://m.booking.naver.com/booking/6/bizes/1500008",
daegu:"https://m.booking.naver.com/booking/6/bizes/1600152"
}

const NAVER_RECTS={
busan:{x:69,y:225,w:292,h:146},
centum:{x:394,y:225,w:292,h:146},
ulsan:{x:719,y:225,w:292,h:146},
gimhae:{x:69,y:395,w:292,h:146},
yangsan:{x:394,y:395,w:292,h:146},
changwon:{x:719,y:395,w:292,h:146},
masan:{x:69,y:565,w:292,h:146},
jinju:{x:394,y:565,w:292,h:146},
incheon:{x:719,y:565,w:292,h:146},
ansan:{x:69,y:734,w:292,h:146},
daegu:{x:394,y:734,w:292,h:146}
}

function buildOverlay(){

const wrap=document.getElementById("naverOverlay")
wrap.innerHTML=""

for(const key in NAVER_RECTS){

const r=NAVER_RECTS[key]
const link=BRANCH_LINKS[key]

if(!link) continue

const a=document.createElement("a")
a.className="ov"
a.href=link
a.target="_blank"

a.dataset.x=r.x
a.dataset.y=r.y
a.dataset.w=r.w
a.dataset.h=r.h

wrap.appendChild(a)
}

applyRects()
}

function applyRects(){

const img=document.querySelector(".naver-grid img")
const sx=img.clientWidth/NAVER_BASE_W
const sy=img.clientHeight/NAVER_BASE_H

document.querySelectorAll(".ov").forEach(el=>{
el.style.left=(el.dataset.x*sx)+"px"
el.style.top=(el.dataset.y*sy)+"px"
el.style.width=(el.dataset.w*sx)+"px"
el.style.height=(el.dataset.h*sy)+"px"
})
}

window.addEventListener("load",buildOverlay)
window.addEventListener("resize",applyRects)

</script>

</body>
