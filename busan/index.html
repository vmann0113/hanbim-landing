<script>

/* ===== 부산점 정보 ===== */

const BRANCH={
name:"부산점",
phone:"0516342325",
tel:"051-634-2325",
reserve:"https://m.booking.naver.com/booking/6/bizes/661812",
kakao:"https://open.kakao.com/o/sG7YbVYh"
}

/* ===== CTA ===== */

document.getElementById("btnCall").onclick=()=>{
location.href="tel:"+BRANCH.phone
}

document.getElementById("btnKakao").onclick=()=>{
window.open(BRANCH.kakao)
}

document.getElementById("btnReserve").onclick=()=>{
window.open(BRANCH.reserve)
}

/* ===== 12지점 오버레이 ===== */

const NAVER_BASE_W=1080
const NAVER_BASE_H=937.2

const BRANCHES=[
{key:"busan",url:"https://m.booking.naver.com/booking/6/bizes/661812"},
{key:"centum",url:"https://booking.naver.com/booking/6/bizes/1577219"},
{key:"ulsan",url:"https://booking.naver.com/booking/6/bizes/1534767"},
{key:"gimhae",url:"https://booking.naver.com/booking/6/bizes/1402679"},
{key:"yangsan",url:"https://booking.naver.com/booking/13/bizes/868629"},
{key:"changwon",url:"https://booking.naver.com/booking/6/bizes/843111"},
{key:"masan",url:"https://booking.naver.com/booking/6/bizes/1526541"},
{key:"jinju",url:"https://m.booking.naver.com/booking/6/bizes/1485854"},
{key:"incheon",url:"https://m.booking.naver.com/booking/13/bizes/1039475"},
{key:"ansan",url:"https://m.booking.naver.com/booking/6/bizes/1500008"},
{key:"daegu",url:"https://m.booking.naver.com/booking/6/bizes/1600152"}
]

const NAVER_RECTS={
busan:{x:69,y:225,w:292,h:146},
centum:{x:394,y:225,w:292,h:146},
ulsan:{x:719,y:225,w:292,h:146},
gimhae:{x:69,y:395,w:292,h:146},
yangsan:{x:394,y:395,w:292,h:146},
changwon:{x:719,y:395,w:292,h:146},
masan:{x:69,y:565,w:292,h:146},
jinju:{x:394,y:565,w:292,h:146},
incheon:{x:719,y:565,w:292,h:146},
ansan:{x:69,y:734,w:292,h:146},
daegu:{x:394,y:734,w:292,h:146}
}

function buildOverlays(){

const overlay=document.getElementById("naverOverlay")
overlay.innerHTML=""

BRANCHES.forEach(b=>{

const r=NAVER_RECTS[b.key]
if(!r)return

const a=document.createElement("a")

a.className="ov"
a.href=b.url
a.target="_blank"

a.dataset.x=r.x
a.dataset.y=r.y
a.dataset.w=r.w
a.dataset.h=r.h

overlay.appendChild(a)

})

applyRects()
}

function applyRects(){

const img=document.querySelector(".naver-grid img")
const overlay=document.getElementById("naverOverlay")

const sx=img.clientWidth/NAVER_BASE_W
const sy=img.clientHeight/NAVER_BASE_H

overlay.querySelectorAll(".ov").forEach(el=>{

el.style.left=(el.dataset.x*sx)+"px"
el.style.top=(el.dataset.y*sy)+"px"
el.style.width=(el.dataset.w*sx)+"px"
el.style.height=(el.dataset.h*sy)+"px"

})
}

window.addEventListener("load",buildOverlays)
window.addEventListener("resize",applyRects)

</script>
