<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?..."></script>
    <link rel="stylesheet" href="/style.css">

    <title>한빔한복 | 공식 무료상담 예약</title>
    <meta name="description" content="대한민국 한복의 기준 한빔한복. 혼주한복, 웨딩한복 대여 및 맞춤 무료상담 예약. 전국 지점 안내 및 2026 신상 룩북 확인.">
    <meta name="keywords" content="한빔한복, 혼주한복, 웨딩한복, 한복대여, 전국지점">

    <meta property="og:type" content="website">
    <meta property="og:title" content="한빔한복 | 공식 무료상담 예약">
    <meta property="og:description" content="격이 다른 한복, 한빔한복에서 인생의 소중한 순간을 준비하세요. 전국 지점 예약 및 상담 안내.">
    <meta property="og:image" content="https://hanbeam.com/assets/img/headimg.png">
    <meta property="og:url" content="https://hanbeam.com">
    
    <meta name="naver-site-verification" content="ae2f48a890278ba75ec4b5b715075a2372cef182" />
</head>

<body>

<main class="landing">
    <section class="block"><img src="/assets/01_hero.webp" alt="한빔한복"></section>
    <section class="block short"><img src="/assets/03_store_intro.webp" alt="매장 소개"></section>
    <section class="block short"><img src="/assets/01_design.webp" alt="디자인 컨셉"></section>
    <section class="block short"><img src="/assets/01_accesary.webp" alt="혜택 안내"></section>
    <section class="block short"><img src="/assets/01_cs.webp" alt="고객 서비스"></section>

    <section class="block naver-grid" id="naverGrid">
        <img src="/assets/08_naver_links.webp" alt="지점별 네이버 예약" id="naverBaseImg">
        <div class="naver-overlay-container" id="naverOverlay"></div>
    </section>

    <section class="block"><img src="/assets/09_footer.webp" alt="하단 정보"></section>
</main>

<div id="toast"></div>

<div class="hb-fixed-cta" id="hbFixedCta">
    <button class="hb-branchBtn" id="hbOpenBranch">
        <span id="hbBranchText">가까운 지점 선택하기</span>
    </button>

    <div class="hb-actionPanel">
        <a class="hb-action" id="hbBtnCall" role="button" aria-label="전화 문의">
            <span class="hb-ico" style="background-image:url('/assets/btn-call.png')"></span>
            <span class="hb-lbl">전화문의</span>
        </a>
        <a class="hb-action" id="hbBtnKakao" role="button" aria-label="카톡 상담">
            <span class="hb-ico" style="background-image:url('/assets/btn-kakao.png')"></span>
            <span class="hb-lbl">카톡문의</span>
        </a>
        <a class="hb-action" id="hbBtnReserve" role="button" aria-label="네이버 예약">
            <span class="hb-ico" style="background-image:url('/assets/btn-reserve.png')"></span>
            <span class="hb-lbl">네이버예약</span>
        </a>
        <a class="hb-action" href="https://www.instagram.com/hanbeam_official" target="_blank" rel="noopener noreferrer">
            <span class="hb-ico" style="background-image:url('/assets/btn-more.png')"></span>
            <span class="hb-lbl">더 알아보기</span>
        </a>
    </div>
</div>

<div class="hb-branchBackdrop" id="hbBranchBackdrop">
    <div class="hb-modal">
        <div class="hb-modalHead">
            <div>지점 선택</div>
            <button id="hbCloseBranch" aria-label="닫기">닫기</button>
        </div>
        <div class="hb-modalBody" id="hbBranchList"></div>
    </div>
</div>

<script>
/**
 * 🛡️ 보안 개편 포인트
 * 1. GAS URL을 직접 호출하는 코드를 제거했습니다. (차단의 주범)
 * 2. 모든 외부 팝업에 'noopener noreferrer' 보안 속성을 강제했습니다.
 * 3. 추적 로직은 브라우저가 신뢰하는 표준 방식으로 대체 준비를 해두었습니다.
 */
function logAction(type, action, branch) {
    console.log(`[HANBEAM LOG] ${type} | ${action} | ${branch}`);
    // 통계가 필요하시면 나중에 GA4(Google Analytics) 연동을 추천드립니다.
}

const BRANCH_DATA = [
    {name:"부산점",phone:"0516342325",reserve:"https://m.booking.naver.com/booking/6/bizes/661812",kakao:"https://open.kakao.com/o/soq7Ns4d", x:69, y:225},
    {name:"센텀점",phone:"01030522325",reserve:"https://booking.naver.com/booking/6/bizes/1577219",kakao:null, x:394, y:225},
    {name:"울산점",phone:"01098072325",reserve:"https://booking.naver.com/booking/6/bizes/1534767",kakao:"https://open.kakao.com/o/sKjCbA0h", x:719, y:225},
    {name:"김해점",phone:"01080652325",reserve:"https://booking.naver.com/booking/6/bizes/1402679",kakao:"https://open.kakao.com/o/sHM2wwsh", x:69, y:395},
    {name:"양산점",phone:"0559120425",reserve:"https://booking.naver.com/booking/13/bizes/868629",kakao:"https://open.kakao.com/o/sp44Hxaf", x:394, y:395},
    {name:"창원점",phone:"0552632325",reserve:"https://booking.naver.com/booking/6/bizes/843111",kakao:"https://open.kakao.com/o/sdcvbh5e", x:719, y:395},
    {name:"마산점",phone:"01088322325",reserve:"https://booking.naver.com/booking/6/bizes/1526541",kakao:"https://open.kakao.com/o/ssWvuvYh", x:69, y:565},
    {name:"진주점",phone:"01056542407",reserve:"https://m.booking.naver.com/booking/6/bizes/1485854",kakao:"https://open.kakao.com/o/sbxBToNh", x:394, y:565},
    {name:"인천점",phone:"0322832325",reserve:"https://m.booking.naver.com/booking/13/bizes/1039475",kakao:"https://open.kakao.com/o/sIrXajUf", x:719, y:565},
    {name:"안산점",phone:"01065912322",reserve:"https://m.booking.naver.com/booking/6/bizes/1500008",kakao:"https://open.kakao.com/o/sqRSjaRh", x:69, y:734},
    {name:"대구점",phone:"01084922328",reserve:"https://m.place.naver.com/place/2043617700/ticket",kakao:null, x:394, y:734}
];

let selectedBranch = null;

const elements = {
    openBtn: document.getElementById("hbOpenBranch"),
    closeBtn: document.getElementById("hbCloseBranch"),
    list: document.getElementById("hbBranchList"),
    backdrop: document.getElementById("hbBranchBackdrop"),
    branchText: document.getElementById("hbBranchText"),
    naverOverlay: document.getElementById("naverOverlay"),
    baseImg: document.getElementById("naverBaseImg")
};

function renderBranchList() {
    elements.list.innerHTML = "";
    BRANCH_DATA.forEach(b => {
        const div = document.createElement("div");
        div.className = "hb-item";
        div.innerText = b.name;
        div.onclick = () => {
            selectedBranch = b;
            elements.branchText.innerText = `${b.name} 선택됨`;
            elements.backdrop.classList.remove("open");
        };
        elements.list.appendChild(div);
    });
}

const BASE_W = 1080;
const BASE_H = 937.2;
const RECT_W = 292;
const RECT_H = 146;

function initOverlays() {
    elements.naverOverlay.innerHTML = "";
    BRANCH_DATA.forEach(b => {
        const a = document.createElement("a");
        a.href = b.reserve;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.title = `${b.name} 네이버 예약`;
        a.dataset.x = b.x;
        a.dataset.y = b.y;
        a.onclick = () => logAction("click", "grid_reserve", b.name);
        elements.naverOverlay.appendChild(a);
    });
    updateOverlayPositions();
}

function updateOverlayPositions() {
    if (!elements.baseImg.clientWidth) return;
    const scaleX = elements.baseImg.clientWidth / BASE_W;
    const scaleY = elements.baseImg.clientHeight / BASE_H;
    elements.naverOverlay.querySelectorAll("a").forEach(a => {
        a.style.left = `${a.dataset.x * scaleX}px`;
        a.style.top = `${a.dataset.y * scaleY}px`;
        a.style.width = `${RECT_W * scaleX}px`;
        a.style.height = `${RECT_H * scaleY}px`;
    });
}

/* CTA 이벤트 */
document.getElementById("hbBtnCall").onclick = () => {
    if(!selectedBranch) return elements.backdrop.classList.add("open");
    logAction("click", "cta_call", selectedBranch.name);
    location.href = `tel:${selectedBranch.phone}`;
};

document.getElementById("hbBtnKakao").onclick = () => {
    if(!selectedBranch) return elements.backdrop.classList.add("open");
    if(!selectedBranch.kakao) return alert("카카오톡 상담 준비 중입니다.");
    logAction("click", "cta_kakao", selectedBranch.name);
    window.open(selectedBranch.kakao, "_blank", "noopener,noreferrer");
};

document.getElementById("hbBtnReserve").onclick = () => {
    if(!selectedBranch) return elements.backdrop.classList.add("open");
    logAction("click", "cta_reserve", selectedBranch.name);
    window.open(selectedBranch.reserve, "_blank", "noopener,noreferrer");
};

elements.openBtn.onclick = () => elements.backdrop.classList.add("open");
elements.closeBtn.onclick = () => elements.backdrop.classList.remove("open");

window.addEventListener("load", () => {
    renderBranchList();
    initOverlays();
});
window.addEventListener("resize", updateOverlayPositions);
</script>
</body>
</html>
